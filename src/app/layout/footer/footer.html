<footer class="footer" role="contentinfo">
  <div class="footer__container">
    <div class="footer__brand">
      <p class="footer__logo">Julia Duarte Beauty Studio</p>
      <p class="footer__tagline">Beleza, sofisticação e cuidado em cada detalhe.</p>
    </div>

    <nav class="footer__links" aria-label="Links do rodapé">
      <a
        [href]="instagramUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="footer__link"
        aria-label="Visitar nosso Instagram"
      >
        <span aria-hidden="true">📸</span> {{ instagramHandle }}
      </a>
      <a
        [href]="whatsappUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="footer__link"
        aria-label="Entrar em contato pelo WhatsApp"
      >
        <span aria-hidden="true">📱</span> {{ phone }}
      </a>
    </nav>

    <p class="footer__copy">
      &copy; {{ currentYear }} Julia Duarte Beauty Studio. Todos os direitos reservados.
    </p>
  </div>
</footer>
