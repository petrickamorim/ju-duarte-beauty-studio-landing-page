<section class="faq" id="faq" aria-labelledby="faq-titulo">
  <div class="container">
    <app-section-header
      eyebrow="Dúvidas Frequentes"
      title="Perguntas Frequentes"
      subtitle="Tire suas dúvidas antes de agendar. Não encontrou o que procura? Fale comigo pelo WhatsApp."
      id="faq-titulo"
    />

    <dl class="faq__lista">
      @for (item of perguntas; track item.pergunta; let i = $index) {
        <div
          class="faq__item"
          [class.faq__item--aberto]="abertaIndice() === i"
        >
          <dt>
            <button
              class="faq__pergunta"
              [attr.aria-expanded]="abertaIndice() === i"
              [attr.aria-controls]="'faq-resposta-' + i"
              (click)="alternar(i)"
              type="button"
            >
              <span>{{ item.pergunta }}</span>
              <span class="faq__icone" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                  <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </button>
          </dt>
          <dd
            class="faq__resposta"
            [id]="'faq-resposta-' + i"
            [attr.hidden]="abertaIndice() !== i ? '' : null"
          >
            <p class="faq__resposta-texto">{{ item.resposta }}</p>
          </dd>
        </div>
      }
    </dl>

    <div class="faq__rodape">
      <p class="faq__rodape-texto">Ainda tem dúvidas?</p>
      <a
        class="faq__whatsapp"
        [href]="whatsappUrl"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Tirar dúvidas pelo WhatsApp"
      >
        Falar no WhatsApp
      </a>
    </div>
  </div>
</section>
